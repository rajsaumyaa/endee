<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroAgent 🚀</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #020b18;
            color: #e0f0ff;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Starfield background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                radial-gradient(1px 1px at 20% 30%, #fff 0%, transparent 100%),
                radial-gradient(1px 1px at 80% 10%, #fff 0%, transparent 100%),
                radial-gradient(1px 1px at 50% 60%, #adf 0%, transparent 100%),
                radial-gradient(1px 1px at 10% 80%, #fff 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 70%, #fff 0%, transparent 100%),
                radial-gradient(1px 1px at 35% 90%, #adf 0%, transparent 100%),
                radial-gradient(1px 1px at 65% 45%, #fff 0%, transparent 100%),
                radial-gradient(2px 2px at 75% 85%, #adf 0%, transparent 100%),
                radial-gradient(1px 1px at 25% 15%, #fff 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 25%, #fff 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeDown 0.8s ease;
        }

        .header .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #0080ff, #7b2fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .header .tagline {
            font-size: 1.1rem;
            color: #7ab3d4;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 300;
        }

        .header .orbit-ring {
            width: 80px;
            height: 80px;
            border: 2px solid #00d4ff33;
            border-radius: 50%;
            margin: 20px auto;
            position: relative;
            animation: spin 8s linear infinite;
        }

        .header .orbit-ring::before {
            content: '🚀';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
        }

        /* Chat container */
        .chat-container {
            background: rgba(0, 20, 50, 0.6);
            border: 1px solid #00d4ff22;
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px #00d4ff11, inset 0 0 40px #00000033;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            max-height: 500px;
            padding-right: 5px;
            scrollbar-width: thin;
            scrollbar-color: #00d4ff33 transparent;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeUp 0.4s ease;
        }

        .message.user {
            display: flex;
            justify-content: flex-end;
        }

        .message.bot {
            display: flex;
            justify-content: flex-start;
        }

        .bubble {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 1rem;
            line-height: 1.6;
        }

        .user .bubble {
            background: linear-gradient(135deg, #0066cc, #0044aa);
            border: 1px solid #00d4ff44;
            border-bottom-right-radius: 4px;
        }

        .bot .bubble {
            background: rgba(0, 40, 80, 0.8);
            border: 1px solid #00d4ff22;
            border-bottom-left-radius: 4px;
            color: #c8e8ff;
        }

        .bot .bubble .bot-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: #00d4ff;
            letter-spacing: 2px;
            margin-bottom: 8px;
            display: block;
        }

        /* Input area */
        .input-area {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            background: rgba(0, 20, 50, 0.8);
            border: 1px solid #00d4ff33;
            border-radius: 12px;
            padding: 14px 20px;
            color: #e0f0ff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-area input:focus {
            border-color: #00d4ff88;
            box-shadow: 0 0 15px #00d4ff22;
        }

        .input-area input::placeholder {
            color: #3a6a8a;
        }

        .send-btn {
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px #00d4ff44;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Suggestions */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .suggestion-chip {
            background: rgba(0, 100, 180, 0.2);
            border: 1px solid #00d4ff33;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 0.85rem;
            color: #7ab3d4;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Rajdhani', sans-serif;
        }

        .suggestion-chip:hover {
            background: rgba(0, 150, 255, 0.2);
            border-color: #00d4ff88;
            color: #e0f0ff;
            transform: translateY(-1px);
        }

        /* Loading dots */
        .loading {
            display: flex;
            gap: 6px;
            padding: 14px 18px;
            background: rgba(0, 40, 80, 0.8);
            border: 1px solid #00d4ff22;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #00d4ff;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .loading span:nth-child(2) { animation-delay: 0.2s; }
        .loading span:nth-child(3) { animation-delay: 0.4s; }

        /* Welcome message */
        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: #3a6a8a;
        }

        .welcome .icon { font-size: 3rem; margin-bottom: 15px; }
        .welcome p { font-size: 1.1rem; letter-spacing: 1px; }

        /* Animations */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="orbit-ring"></div>
            <div class="logo">ASTROAGENT</div>
            <div class="tagline">Your Personal Space & Science Intelligence</div>
        </div>

        <div class="chat-container">
            <!-- Suggestion chips -->
            <div class="suggestions">
                <div class="suggestion-chip" onclick="sendSuggestion(this)">🚀 Artemis 2 mission update</div>
                <div class="suggestion-chip" onclick="sendSuggestion(this)">🔭 James Webb discoveries</div>
                <div class="suggestion-chip" onclick="sendSuggestion(this)">🛸 SpaceX latest launch</div>
                <div class="suggestion-chip" onclick="sendSuggestion(this)">🪐 Mars missions 2026</div>
            </div>

            <!-- Messages -->
            <div class="messages" id="messages">
                <div class="welcome">
                    <div class="icon">🌌</div>
                    <p>Ask me anything about space, astronomy & science!</p>
                </div>
            </div>

            <!-- Input -->
            <div class="input-area">
                <input
                    type="text"
                    id="queryInput"
                    placeholder="Ask about space, astronomy, science..."
                    onkeypress="if(event.key==='Enter') sendMessage()"
                />
                <button class="send-btn" onclick="sendMessage()" id="sendBtn">SEND</button>
            </div>
        </div>
    </div>

    <script>
        function sendSuggestion(chip) {
            document.getElementById('queryInput').value = chip.textContent.slice(2);
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('queryInput');
            const query = input.value.trim();
            if (!query) return;

            const messages = document.getElementById('messages');
            const sendBtn = document.getElementById('sendBtn');

            // Clear welcome message on first query
            const welcome = messages.querySelector('.welcome');
            if (welcome) welcome.remove();

            // Add user message
            messages.innerHTML += `
                <div class="message user">
                    <div class="bubble">${query}</div>
                </div>`;

            input.value = '';
            sendBtn.disabled = true;

            // Add loading dots
            messages.innerHTML += `
                <div class="message bot" id="loading">
                    <div class="loading">
                        <span></span><span></span><span></span>
                    </div>
                </div>`;

            messages.scrollTop = messages.scrollHeight;

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                const data = await response.json();

                // Remove loading
                document.getElementById('loading').remove();

                // Add bot response
                messages.innerHTML += `
                    <div class="message bot">
                        <div class="bubble">
                            <span class="bot-label">✦ ASTROAGENT</span>
                            ${data.answer.replace(/\n/g, '<br>')}
                        </div>
                    </div>`;

            } catch (err) {
                document.getElementById('loading').remove();
                messages.innerHTML += `
                    <div class="message bot">
                        <div class="bubble">
                            <span class="bot-label">✦ ASTROAGENT</span>
                            Sorry, something went wrong. Please try again!
                        </div>
                    </div>`;
            }

            sendBtn.disabled = false;
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
